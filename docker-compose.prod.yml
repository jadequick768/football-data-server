services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-football}
      - POSTGRES_USER=${POSTGRES_USER:-football}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SPORTSRC_API_KEY=${SPORTSRC_API_KEY}
      - SPORTSRC_BASE_URL=https://api.sportsrc.org/v2/
      - REDIS_URL=redis://redis:6379
      - CACHE_PREFIX=sportsrc:v1
      - WEB_ORIGIN=${WEB_ORIGIN}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-football}
      - POSTGRES_USER=${POSTGRES_USER:-football}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_TTL_SEC=${JWT_ACCESS_TTL_SEC:-1800}
      - JWT_REFRESH_TTL_SEC=${JWT_REFRESH_TTL_SEC:-2592000}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.tintuc360.net}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
    depends_on:
      - redis
      - postgres

  web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_API_BASE_URL=https://api.tintuc360.net
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://api.tintuc360.net
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  redis_data:
  pg_data:
  caddy_data:
  caddy_config:
