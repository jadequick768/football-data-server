services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-football}
      - POSTGRES_USER=${POSTGRES_USER:-football}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-football}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SPORTSRC_API_KEY=${SPORTSRC_API_KEY}
      - SPORTSRC_BASE_URL=https://api.sportsrc.org/v2/
      - REDIS_URL=redis://redis:6379
      - CACHE_PREFIX=sportsrc:v1
      - WEB_ORIGIN=${WEB_ORIGIN}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-football}
      - POSTGRES_USER=${POSTGRES_USER:-football}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-football}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_TTL_SEC=${JWT_ACCESS_TTL_SEC:-1800}
      - JWT_REFRESH_TTL_SEC=${JWT_REFRESH_TTL_SEC:-2592000}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.tintuc360.net}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
    depends_on:
      - redis
      - postgres
    ports:
      - "3000:3000"

  web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - api
    ports:
      - "3001:3000"

volumes:
  redis_data:
  pg_data:
