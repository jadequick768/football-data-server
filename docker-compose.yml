services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./api
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SPORTSRC_API_KEY=${SPORTSRC_API_KEY}
      - SPORTSRC_BASE_URL=https://api.sportsrc.org/v2/
      - REDIS_URL=redis://redis:6379
      - CACHE_PREFIX=sportsrc:v1
    depends_on:
      - redis
    ports:
      - "3000:3000"

  web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - api
    ports:
      - "3001:3000"

volumes:
  redis_data:
